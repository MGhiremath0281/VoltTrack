# App
spring.application.name=volttrack

# Load environment variables from .env
spring.config.import=optional:file:.env[.properties]

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/gitgear
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.file.name=C:/Users/HP/OneDrive/Desktop/GESCOM/VoltTrack/logs/volttrack.log

app.admin.username=${APP_ADMIN_USERNAME}
app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.cache.type=redis